name: Build Poster PDF

on:
  push:
    paths:
      - 'docs/poster/**'
      - 'figs/**'
      - '.github/workflows/build_poster.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX (xelatex with tikzposter)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: poster.tex
          working_directory: docs/poster
          compiler: latexmk
          args: -pdfxe -interaction=nonstopmode -halt-on-error -file-line-error
          extra_system_packages: |
            font-noto-cjk

      - name: List generated files
        run: |
          ls -la docs/poster/
          if [ -f docs/poster/poster.pdf ]; then
            echo "Poster PDF size: $(stat -c%s docs/poster/poster.pdf) bytes"
          fi

      - name: Commit PDF
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add docs/poster/poster.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
          else
            DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "build(poster): auto-rebuild PDF ${DATE} [skip ci]"
            git push
          fi

      - name: Upload PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poster-pdf
          path: docs/poster/poster.pdf
          retention-days: 30
