name: Build Paper PDF

on:
  push:
    paths:
      - 'docs/paper/**'
      - '.github/workflows/build_paper.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX (xelatex with bibtex)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: docs/paper
          compiler: latexmk
          args: -pdfxe -interaction=nonstopmode -halt-on-error -file-line-error
          # 日本語対応 + bibtex 用追加パッケージ
          extra_system_packages: |
            fonts-noto-cjk
            fonts-noto-cjk-extra
            texlive-fonts-recommended
            texlive-fonts-extra
            texlive-lang-japanese
            texlive-lang-cjk
            texlive-bibtex-extra

      - name: List generated files
        run: |
          ls -la docs/paper/
          if [ -f docs/paper/main.pdf ]; then
            echo "PDF size: $(stat -c%s docs/paper/main.pdf) bytes"
          fi

      - name: Commit PDF
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add docs/paper/main.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
          else
            DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "build(paper): auto-rebuild PDF ${DATE} [skip ci]"
            git push
          fi

      - name: Upload PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: docs/paper/main.pdf
          retention-days: 30
