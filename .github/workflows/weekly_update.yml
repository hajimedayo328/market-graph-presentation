name: Weekly Data Update

on:
  schedule:
    # 毎週月曜 UTC 22:00 (= JST 月曜 07:00) に実行
    # 厳密には日曜 22:00 UTC = 月曜 07:00 JST
    - cron: '0 22 * * 0'
  workflow_dispatch:  # 手動トリガーも有効

permissions:
  contents: write  # commit & push に必要

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest data & recompute gamma timeseries
        run: |
          python scripts/update_data.py 5
        timeout-minutes: 10

      # NOTE: backtest.py (旧 look-ahead 込み版) は app.html で未使用かつ
      # 空データ時に NaTType でクラッシュするため週次からは除外。
      # バックテスト結果は過去分析なので毎週再計算不要 (既存 JSON を build が参照)。

      - name: Build index.html (research presentation)
        run: |
          python scripts/build_index.py
        timeout-minutes: 5

      - name: Build app.html (implementation demo)
        run: |
          python scripts/build_app.py
        timeout-minutes: 5

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/ index.html app.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u '+%Y-%m-%d')
            git commit -m "chore(data): weekly update $DATE [skip ci]"
            git push
          fi
